<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Rush</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; color:#fff; }
    #canvas { display:block; }

    /* ── Overlay ── */
    #overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.92);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:100; gap:18px;
    }
    #overlay h1 { font-size:52px; color:#00ffcc; letter-spacing:4px; text-shadow:0 0 30px #00ffcc; }
    #overlay .subtitle { color:#888; font-size:15px; }

    .creator-row {
      display:flex; gap:30px; align-items:flex-start;
    }

    .creator-section { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .creator-section h3 { font-size:13px; letter-spacing:2px; color:#00ffcc; text-transform:uppercase; }

    /* Colour grid */
    #color-grid { display:grid; grid-template-columns:repeat(6,34px); gap:6px; }
    .color-swatch {
      width:34px; height:34px; border-radius:50%; cursor:pointer;
      border:3px solid transparent; transition:transform .1s, border-color .1s;
    }
    .color-swatch:hover  { transform:scale(1.15); }
    .color-swatch.active { border-color:#fff; transform:scale(1.15); }

    /* Hat grid */
    #hat-grid { display:grid; grid-template-columns:repeat(4,70px); gap:8px; }
    .hat-btn {
      width:70px; height:50px; background:#1a1a1a; border:2px solid #333;
      border-radius:8px; cursor:pointer; display:flex; flex-direction:column;
      align-items:center; justify-content:center; font-size:11px; color:#aaa;
      gap:4px; transition:border-color .1s, color .1s;
    }
    .hat-btn .hat-icon { font-size:20px; }
    .hat-btn:hover  { border-color:#00ffcc; color:#fff; }
    .hat-btn.active { border-color:#00ffcc; color:#00ffcc; background:#0a2020; }

    /* Map select */
    #map-select select {
      background:#111; color:#fff; border:2px solid #00ffcc;
      padding:8px 16px; font-size:15px; border-radius:8px; cursor:pointer;
      width:200px;
    }

    #play-btn {
      background:#00ffcc; color:#000; border:none;
      padding:14px 60px; font-size:20px; font-weight:bold;
      border-radius:30px; cursor:pointer;
      transition:transform .1s, box-shadow .1s;
      margin-top:6px;
    }
    #play-btn:hover { transform:scale(1.05); box-shadow:0 0 30px #00ffcc; }

    /* ── HUD ── */
    #ui {
      position:fixed; inset:0; pointer-events:none; color:#fff;
    }
    #crosshair {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:16px; height:16px;
    }
    #crosshair::before,#crosshair::after {
      content:''; position:absolute; background:rgba(255,255,255,0.7);
    }
    #crosshair::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; left:0; transform:translateY(-50%); }

    #floor-label {
      position:absolute; top:18px; left:50%; transform:translateX(-50%);
      font-size:17px; font-weight:bold; letter-spacing:2px;
      background:rgba(0,0,0,0.55); padding:5px 20px; border-radius:20px;
    }
    #panel-bar {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      text-align:center;
    }
    #panel-label { font-size:20px; font-weight:bold; margin-bottom:6px; text-shadow:0 0 8px #00ffcc; }
    #panel-track {
      display:flex; gap:8px; justify-content:center; margin-bottom:8px;
    }
    .panel-pip {
      width:18px; height:18px; border-radius:50%;
      border:2px solid #00ffcc; background:transparent;
      transition:background .3s;
    }
    .panel-pip.done { background:#00ffcc; }
    #interact-hint {
      font-size:13px; background:rgba(0,0,0,0.5);
      padding:4px 14px; border-radius:20px; display:none; margin:0 auto;
    }

    #crew-hud {
      position:absolute; top:18px; left:18px;
      display:flex; flex-direction:column; gap:4px;
    }
    #crew-hud-label { font-size:10px; letter-spacing:2px; color:#888; }
    #crew-dots { display:flex; gap:5px; flex-wrap:wrap; max-width:120px; }
    .crew-dot {
      width:12px; height:12px; border-radius:50%;
    }

    #message {
      position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
      font-size:30px; font-weight:bold; color:#00ffcc;
      text-shadow:0 0 20px #00ffcc; text-align:center;
      display:none; pointer-events:none;
    }
    #flash {
      position:fixed; inset:0; opacity:0; pointer-events:none;
      transition:opacity .3s; z-index:90;
    }

    #controls-hint {
      position:absolute; bottom:18px; right:18px;
      font-size:11px; color:#555; line-height:1.8;
      text-align:right;
    }

    /* Stamina bar */
    #stamina-bar {
      position:absolute; bottom:28px; left:18px;
      display:flex; flex-direction:column; gap:4px;
    }
    #stamina-label { font-size:10px; letter-spacing:2px; color:#888; }
    #stamina-segs { display:flex; gap:3px; }
    .sp-seg {
      width:30px; height:10px;
      background:#00ffcc;
      border:2px solid rgba(255,255,255,0.3);
      border-radius:3px;
      transition:background .15s;
    }
    .sp-seg.depleted { background:#333; }
    .sp-seg.lost     { background:#991111; }

    /* PVP HUD */
    #pvp-hud {
      position:absolute; top:18px; right:18px;
      display:none; flex-direction:column; gap:5px; align-items:flex-end;
      text-align:right;
    }
    #pvp-teams { font-size:17px; font-weight:bold; letter-spacing:1px; }
    #pvp-weapon { font-size:13px; color:#ffcc00; letter-spacing:1px; }

    /* Mode toggle */
    #pvp-toggle {
      display:flex; align-items:center; gap:10px;
      font-size:16px; font-weight:bold; letter-spacing:2px;
      color:#aaa; cursor:pointer; user-select:none;
    }
    #pvp-check { width:20px; height:20px; cursor:pointer; accent-color:#00ffcc; }

    /* Carrying indicator */
    #carry-hint {
      position:absolute; top:60%; left:50%; transform:translateX(-50%);
      font-size:14px; color:#ffcc00; background:rgba(0,0,0,0.55);
      padding:4px 14px; border-radius:20px; display:none;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="ui">
  <div id="crosshair"></div>
  <div id="floor-label">FLOOR 1 — OFFICE</div>
  <div id="crew-hud">
    <div id="crew-hud-label">CREW</div>
    <div id="crew-dots"></div>
  </div>
  <div id="panel-bar">
    <div id="panel-label">PANELS: 0 / 5</div>
    <div id="panel-track"></div>
    <div id="interact-hint">[E] Activate Panel</div>
  </div>
  <div id="message"></div>
  <div id="carry-hint">Carrying a head — get to the elevator!</div>
  <div id="pvp-hud">
    <div id="pvp-teams"></div>
    <div id="pvp-weapon"></div>
  </div>
  <div id="stamina-bar">
    <div id="stamina-label">SPRINT</div>
    <div id="stamina-segs">
      <div class="sp-seg" id="sp-0"></div>
      <div class="sp-seg" id="sp-1"></div>
      <div class="sp-seg" id="sp-2"></div>
    </div>
  </div>
  <div id="controls-hint">WASD — Move<br>Shift — Sprint<br>Mouse — Look<br>E — Interact<br>V — Toggle POV<br>Click — Lock cursor</div>
</div>
<div id="flash"></div>

<div id="overlay">
  <h1>FLOOR RUSH</h1>
  <p class="subtitle">Find and activate all panels — then take the elevator</p>

  <div class="creator-row">
    <div class="creator-section">
      <h3>Colour</h3>
      <div id="color-grid"></div>
    </div>
    <div class="creator-section">
      <h3>Hat</h3>
      <div id="hat-grid"></div>
    </div>
    <div class="creator-section">
      <h3>Map</h3>
      <div id="map-select">
        <select id="map-picker">
          <option value="office">Office</option>
          <option value="polus">Polus</option>
          <option value="caverns">Caverns</option>
          <option value="lab">Lab</option>
          <option value="ikea">IKEA</option>
          <option value="carpark">Car Park</option>
          <option value="pyramid">Pyramid</option>
        </select>
      </div>
    </div>
  </div>

  <label id="pvp-toggle"><input type="checkbox" id="pvp-check"> PVP MODE</label>
  <button id="play-btn">PLAY</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module" src="game.js?v=3"></script>
</body>
</html>
