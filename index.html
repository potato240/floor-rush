<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas { display: block; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; color: #fff;
    }
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
    #hud {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    #panel-status {
      font-size: 22px; font-weight: bold;
      text-shadow: 0 0 10px #00ffcc;
      margin-bottom: 8px;
    }
    #interact-hint {
      font-size: 14px; opacity: 0.7;
      background: rgba(0,0,0,0.5);
      padding: 4px 12px; border-radius: 20px;
      display: none;
    }
    #floor-info {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px; font-weight: bold;
      background: rgba(0,0,0,0.6);
      padding: 6px 20px; border-radius: 20px;
      letter-spacing: 1px;
    }
    #team-status {
      position: absolute; top: 20px; right: 20px;
      font-size: 13px;
    }
    .crew-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin: 2px;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: all; z-index: 100;
    }
    #overlay h1 { font-size: 52px; color: #00ffcc; margin-bottom: 10px; letter-spacing: 3px; }
    #overlay p  { color: #aaa; margin-bottom: 30px; font-size: 16px; }
    #overlay button {
      background: #00ffcc; color: #000; border: none;
      padding: 14px 40px; font-size: 18px; font-weight: bold;
      border-radius: 30px; cursor: pointer; pointer-events: all;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #overlay button:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ffcc; }
    #map-select { margin-bottom: 20px; }
    #map-select select {
      background: #111; color: #fff; border: 1px solid #00ffcc;
      padding: 8px 16px; font-size: 15px; border-radius: 8px;
      cursor: pointer;
    }
    #elevator-flash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 90;
    }
    #message {
      position: absolute; top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px; font-weight: bold;
      color: #00ffcc; text-shadow: 0 0 20px #00ffcc;
      text-align: center; display: none;
    }
    #npc-crew {
      position: absolute; top: 20px; left: 20px;
    }
    #npc-crew-label { font-size: 12px; opacity: 0.6; margin-bottom: 4px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="crosshair"></div>
  <div id="floor-info">FLOOR 1 — OFFICE</div>
  <div id="npc-crew">
    <div id="npc-crew-label">CREW</div>
    <div id="crew-dots"></div>
  </div>
  <div id="team-status"></div>
  <div id="hud">
    <div id="panel-status">PANELS: 0 / 3</div>
    <div id="interact-hint">[E] Activate Panel</div>
  </div>
  <div id="message"></div>
</div>
<div id="elevator-flash"></div>

<div id="overlay">
  <h1>FLOOR RUSH</h1>
  <p>Find and activate all panels to open the elevator</p>
  <div id="map-select">
    <select id="map-picker">
      <option value="office">Office</option>
      <option value="polus">Polus</option>
      <option value="caverns">Caverns</option>
      <option value="lab">Lab</option>
      <option value="ikea">IKEA</option>
      <option value="carpark">Car Park</option>
    </select>
  </div>
  <button id="start-btn">PLAY</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
